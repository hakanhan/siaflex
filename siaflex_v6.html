<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siaflex — Service Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f0f2f5;
  --white:#ffffff;
  --panel:#fafbfc;
  --b1:#e2e5ea;
  --b2:#c8cdd6;
  --green:#177a46;
  --green-bg:#edf7f1;
  --green-mid:rgba(23,122,70,.18);
  --t1:#111418;
  --t2:#4a5568;
  --t3:#8c97a8;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --nav-w:200px;
  --mid-w:280px;
  --bar-h:46px;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:var(--sans);color:var(--t1);display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--b2);}

/* TOP BAR */
.bar{
  height:var(--bar-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;background:var(--white);border-bottom:1px solid var(--b1);flex-shrink:0;
}
.bar-left{display:flex;align-items:center;gap:12px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-mark{width:22px;height:22px;border-radius:4px;background:var(--green);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:#fff;font-weight:500;}
.logo-name{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--t1);}
.divider{width:1px;height:18px;background:var(--b1);}
.crumb{font-family:var(--mono);font-size:10px;color:var(--t3);}
.crumb b{color:var(--t2);font-weight:500;}
.bar-right{display:flex;align-items:center;gap:8px;}
.lang{display:flex;border:1px solid var(--b2);border-radius:3px;overflow:hidden;}
.lang-btn{padding:3px 8px;font-family:var(--mono);font-size:9px;color:var(--t3);background:none;border:none;cursor:pointer;}
.lang-btn.on{background:var(--green);color:#fff;}
.ver{font-family:var(--mono);font-size:9px;color:var(--t3);}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* LEFT NAV */
.nav{
  width:var(--nav-w);flex-shrink:0;
  background:var(--white);border-right:1px solid var(--b1);
  overflow-y:auto;display:flex;flex-direction:column;
}
.nav-grp{padding:8px 0;}
.nav-grp+.nav-grp{border-top:1px solid var(--b1);}
.nav-lbl{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;padding:0 13px 6px;}
.nav-row{
  display:flex;align-items:center;gap:7px;padding:7px 13px;
  cursor:pointer;font-size:11px;color:var(--t2);
  border-left:2px solid transparent;transition:.1s;user-select:none;
}
.nav-row:hover{background:var(--bg);}
.nav-row.sel{background:var(--green-bg);color:var(--green);border-left-color:var(--green);font-weight:500;}
.nr-num{font-family:var(--mono);font-size:8px;color:var(--t3);width:14px;flex-shrink:0;}
.nav-row.sel .nr-num{color:var(--green);}
.nr-dot{width:5px;height:5px;border-radius:50%;background:var(--b2);flex-shrink:0;}
.nav-row.sel .nr-dot{background:var(--green);}
/* domain nav rows */
.nav-dom{display:flex;align-items:center;gap:6px;padding:5px 13px;cursor:pointer;font-size:10px;color:var(--t3);border-left:2px solid transparent;transition:.1s;user-select:none;}
.nav-dom:hover{background:var(--bg);color:var(--t2);}
.nav-dom.sel{background:var(--green-bg);color:var(--green);border-left-color:var(--green);}
.nd-code{font-family:var(--mono);font-size:8px;flex-shrink:0;min-width:62px;}

/* MID PANEL */
.mid{
  width:var(--mid-w);flex-shrink:0;
  background:var(--panel);border-right:1px solid var(--b1);
  overflow-y:auto;display:flex;flex-direction:column;
}
.mid-hd{
  padding:14px 16px 12px;border-bottom:1px solid var(--b1);
  background:var(--white);flex-shrink:0;
}
.mid-label{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;margin-bottom:4px;}
.mid-name{font-size:13px;font-weight:600;color:var(--t1);line-height:1.25;margin-bottom:3px;}
.mid-sub{font-family:var(--mono);font-size:8px;margin-bottom:5px;opacity:.7;}
.mid-desc{font-size:10px;color:var(--t2);line-height:1.6;font-weight:300;}

.mid-sec{padding:12px 0;}
.mid-sec+.mid-sec{border-top:1px solid var(--b1);}
.mid-sec-lbl{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;padding:0 14px 8px;}

/* flow steps */
.step-row{
  display:flex;align-items:center;gap:9px;padding:7px 14px;
  cursor:pointer;transition:.1s;border-left:2px solid transparent;
}
.step-row:hover{background:var(--white);}
.step-row.sel{background:var(--white);border-left-color:var(--green);}
.sr-num{font-family:var(--mono);font-size:8px;color:var(--t3);width:16px;flex-shrink:0;}
.step-row.sel .sr-num{color:var(--green);}
.sr-name{font-size:11px;color:var(--t2);flex:1;line-height:1.35;}
.step-row.sel .sr-name{color:var(--t1);font-weight:500;}
.sr-code{font-family:var(--mono);font-size:8px;color:var(--t3);}
.step-row.sel .sr-code{color:var(--green);opacity:.8;}
.step-arrow{padding:0 14px;font-size:8px;color:var(--b2);}

.cyc-badge{
  margin:4px 14px 8px;display:inline-block;
  font-family:var(--mono);font-size:8px;color:var(--green);
  background:var(--green-bg);border:1px solid var(--green-mid);
  border-radius:3px;padding:2px 7px;
}

/* domain rows */
.dom-row{
  display:flex;align-items:flex-start;gap:9px;padding:8px 14px;
  cursor:pointer;transition:.1s;border-left:2px solid transparent;
}
.dom-row:hover{background:var(--white);}
.dom-row.sel{background:var(--white);border-left-color:var(--green);}
.dr-code{font-family:var(--mono);font-size:8px;color:var(--t3);flex-shrink:0;padding-top:1px;min-width:58px;}
.dom-row.sel .dr-code{color:var(--green);}
.dr-name{font-size:10px;font-weight:500;color:var(--t2);margin-bottom:1px;}
.dom-row.sel .dr-name{color:var(--t1);}

/* accordion domains in mid */
.acc-sep{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;border-top:1px solid var(--b1);}
.acc-sep-line{flex:1;height:1px;background:var(--b1);}
.acc-sep-lbl{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;white-space:nowrap;}
.acc-dom{border-bottom:1px solid var(--b1);}
.acc-hd{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;transition:.1s;user-select:none;}
.acc-hd:hover{background:var(--bg);}
.acc-hd.open{background:var(--green-bg);}
.acc-arr{font-size:9px;color:var(--t3);transition:transform .15s;flex-shrink:0;width:10px;}
.acc-hd.open .acc-arr{transform:rotate(90deg);color:var(--green);}
.acc-dk{font-family:var(--mono);font-size:8px;color:var(--t3);flex-shrink:0;min-width:60px;}
.acc-hd.open .acc-dk{color:var(--green);}
.acc-dn{font-size:11px;font-weight:500;color:var(--t2);}
.acc-hd.open .acc-dn{color:var(--t1);}
.acc-body{display:none;background:var(--bg);}
.acc-body.open{display:block;}
.svc-item{display:flex;align-items:flex-start;gap:7px;padding:6px 14px 6px 20px;cursor:pointer;transition:.1s;border-left:2px solid transparent;}
.svc-item:hover{background:var(--white);}
.svc-item.sel{background:var(--white);border-left-color:var(--green);}
.si-code{font-family:var(--mono);font-size:8px;color:var(--t3);flex-shrink:0;min-width:68px;padding-top:1px;}
.svc-item.sel .si-code{color:var(--green);}
.si-name{font-size:10px;font-weight:500;color:var(--t2);line-height:1.35;}
.svc-item.sel .si-name{color:var(--t1);}
.si-tiers{display:flex;gap:2px;margin-top:3px;}
.si-t{width:12px;height:12px;border-radius:2px;font-family:var(--mono);font-size:7px;display:flex;align-items:center;justify-content:center;}
.si-t.on{background:rgba(23,122,70,.12);color:var(--green);}
.si-t.off{background:var(--b1);color:var(--t3);}
/* dom filter banner */
.dfb{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--green-bg);border-bottom:1px solid rgba(23,122,70,.2);font-family:var(--mono);font-size:8px;color:var(--green);flex-shrink:0;}
.dfb-x{margin-left:auto;cursor:pointer;opacity:.6;font-size:9px;}
.dfb-x:hover{opacity:1;}

/* empty mid */
.mid-empty{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;}
.mid-empty-txt{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:center;line-height:1.8;}

/* RIGHT DETAIL */
.det{flex:1;overflow-y:auto;background:var(--bg);}
.det-inner{padding:20px 24px;max-width:640px;}
.det-back{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--t3);cursor:pointer;margin-bottom:14px;}
.det-back:hover{color:var(--t2);}
.det-eyebrow{font-family:var(--mono);font-size:8px;color:var(--green);letter-spacing:2px;margin-bottom:4px;}
.det-title{font-size:17px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:8px;}
.det-desc{font-size:12px;color:var(--t2);line-height:1.75;font-weight:300;margin-bottom:20px;}

.det-card{background:var(--white);border:1px solid var(--b1);border-radius:6px;overflow:hidden;margin-bottom:10px;}
.dc-hd{padding:8px 14px;border-bottom:1px solid var(--b1);font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;display:flex;align-items:center;gap:7px;}
.dc-hd::before{content:'';width:3px;height:9px;background:var(--green);border-radius:2px;flex-shrink:0;}
.dc-bd{padding:12px 14px;}
.det-li{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--t2);margin-bottom:5px;line-height:1.5;}
.det-li::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;}
.det-tools{display:flex;flex-wrap:wrap;gap:4px;}
.det-tool{font-family:var(--mono);font-size:9px;color:var(--t2);background:var(--bg);border:1px solid var(--b1);border-radius:3px;padding:2px 7px;}
.det-tier-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.det-tier{background:var(--bg);border:1px solid var(--b1);border-radius:5px;padding:9px;text-align:center;}
.dtt-l{font-size:20px;font-weight:700;color:var(--b2);line-height:1;margin-bottom:2px;}
.dtt-n{font-size:9px;font-weight:600;color:var(--t2);margin-bottom:1px;}
.dtt-t{font-family:var(--mono);font-size:7px;color:var(--t3);}

/* domain services list */
.dsvc-row{
  background:var(--white);border:1px solid var(--b1);border-radius:5px;
  padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.1s;
}
.dsvc-row:hover{border-color:var(--b2);}
.dsvc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.dsvc-code{font-family:var(--mono);font-size:8px;color:var(--green);}
.dsvc-tiers{display:flex;gap:2px;}
.dsvc-t{width:13px;height:13px;border-radius:2px;font-family:var(--mono);font-size:7px;display:flex;align-items:center;justify-content:center;}
.dsvc-t.on{background:rgba(23,122,70,.1);color:var(--green);}
.dsvc-t.off{background:var(--bg);color:var(--t3);}
.dsvc-name{font-size:11px;font-weight:500;color:var(--t1);margin-bottom:2px;}
.dsvc-desc{font-size:10px;color:var(--t2);line-height:1.5;font-weight:300;}

/* det empty */
.det-empty{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.det-empty-icon{font-size:28px;opacity:.2;}
.det-empty-txt{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:center;line-height:1.8;}

/* tiers page */
.tiers-inner{padding:20px 24px;}
.ti-ey{font-family:var(--mono);font-size:8px;color:var(--t3);letter-spacing:2px;margin-bottom:4px;}
.ti-title{font-size:16px;font-weight:600;color:var(--t1);margin-bottom:16px;}
.tier-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tc{background:var(--white);border:1px solid var(--b1);border-radius:6px;padding:16px;}
.tc-l{font-size:36px;font-weight:700;color:var(--b1);line-height:1;margin-bottom:7px;}
.tc-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.tc-tag{font-family:var(--mono);font-size:7px;color:var(--t3);margin-bottom:8px;}
.tc-desc{font-size:10px;color:var(--t2);line-height:1.6;padding-bottom:8px;border-bottom:1px solid var(--b1);margin-bottom:8px;font-weight:300;}
.tc-li{display:flex;align-items:flex-start;gap:6px;font-size:10px;color:var(--t2);margin-bottom:4px;line-height:1.4;}
.tc-li::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:4px;}
</style>
</head>
<body>

<div class="bar">
  <div class="bar-left">
    <div class="logo">
      <div class="logo-mark">S</div>
      <div class="logo-name">SIAFLEX</div>
    </div>
    <div class="divider"></div>
    <div class="crumb" id="crumb"></div>
  </div>
  <div class="bar-right">
    <div class="lang">
      <button class="lang-btn on" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('tr')">TR</button>
    </div>
    <div class="ver">v5.0 · 2026</div>
  </div>
</div>

<div class="layout">
  <div class="nav" id="nav"></div>
  <div class="mid" id="mid"></div>
  <div class="det" id="det"></div>
</div>

   items:{en:['Current state vs ITIL / ISO 27001 / vendor BP','Gap report and prioritized action list','C-Level executive summary + technical detail','Annual review option','10 support calls / year'],tr:['Mevcut durum vs ITIL / ISO 27001 / üretici BP','Gap raporu ve öncelikli aksiyon listesi','C-Level yönetici özeti + teknik detay','Yıllık kontrol seçeneği','10 teknik destek hakkı / yıl']}},

   items:{en:['All Tier A deliverables','Project-based remediation execution','Change management and implementation','Retest and formal verification','Periodic re-assessment cycle'],tr:['Tüm Kat A çıktıları dahil','Proje bazlı iyileştirme uygulaması','Değişiklik yönetimi ve uygulama','Yeniden test ve resmi doğrulama','Periyodik yeniden değerlendirme döngüsü']}},
  {l:'C',name:{en:'Assess + Managed',tr:'Değerlendir + Yönet'},tag:{en:'ONGOING SUBSCRIPTION',tr:'SÜREKLİ ABONELİK'},

   items:{en:['All Tier B included','Full operational ownership transferred','SLA-backed proactive monitoring','Lifecycle renews automatically','Siaflex as dedicated IT/OT partner'],tr:['Tüm Kat B dahil','Tam operasyonel sahiplik devredilir','SLA garantili proaktif izleme','Yaşam döngüsü otomatik yenilenir','Siaflex adanmış IT/OT altyapı ortağı']}}

/* ── new functions above ── */

function tiersPage(){
  var cards=TIERS.map(function(t){
    var items=L(t.items).map(function(i){ return '<div class="tc-li">'+i+'</div>'; }).join('');
    return '<div class="tc"><div class="tc-l">'+t.l+'</div><div class="tc-name">'+L(t.name)+'</div>'
      +'<div class="tc-tag">'+L(t.tag)+'</div><div class="tc-desc">'+L(t.desc)+'</div>'+items+'</div>';
  }).join('');
  return '<div class="tiers-inner"><div class="ti-ey">'+(lang==='en'?'ENGAGEMENT MODEL':'HİZMET MODELİ')+'</div>'
    +'<div class="ti-title">'+(lang==='en'?'Three ways to work together':'Birlikte çalışmanın üç yolu')+'</div>'
    +'<div class="tier-cards">'+cards+'</div></div>';
}

/* ── ALL DOMAINS (nav order) ── */
var ALL_DOMS=(function(){
  var seen={},res=[];
  ['fw1','fw2','fw3','fw4','fw5','fw6'].forEach(function(k){
    FW[k].doms.forEach(function(d){ if(!seen[d]){seen[d]=1;res.push(d);} });
  });
  return res;
})();

/* ── BUILD NAV ── */
function buildNav(){
  var fwList=[
    {id:'fw1',name:{en:'Infrastructure Assurance',tr:'Altyapı Güvencesi'}},
    {id:'fw2',name:{en:'CTEM',tr:'CTEM'}},
    {id:'fw3',name:{en:'Secure Connectivity',tr:'Güvenli Bağlantı'}},
    {id:'fw4',name:{en:'DC Resilience & Continuity',tr:'DC Dayanıklılık & Süreklilik'}},
    {id:'fw5',name:{en:'OT Security',tr:'OT Güvenliği'}},
    {id:'fw6',name:{en:'Security Validation',tr:'Güvenlik Doğrulama'}}
  ];
  var h='<div class="nav-grp"><div class="nav-lbl">'+(lang==='en'?'FRAMEWORKS':'ÇERÇEVELER')+'</div>';
  fwList.forEach(function(f){
    var a=(!curDomFilter&&curFW===f.id)?' sel':'';
    h+='<div class="nav-row'+a+'" onclick="selFW(\''+f.id+'\')">'
      +'<span class="nr-num">'+FW[f.id].num+'</span>'
      +'<span style="flex:1">'+L(f.name)+'</span></div>';
  });
  h+='</div>';
  h+='<div class="nav-grp"><div class="nav-lbl">'+(lang==='en'?'BY DOMAIN':'DOMAİNE GÖRE')+'</div>';
  ALL_DOMS.forEach(function(dk){
    var d=DOM[dk];
    var a=curDomFilter===dk?' sel':'';
    h+='<div class="nav-dom'+a+'" onclick="selDomFilter(\''+dk+'\')">'
      +'<span class="nd-code">'+dk+'</span>'
      +'<span style="flex:1">'+( d?L(d.name):dk )+'</span></div>';
  });
  h+='</div>';
  h+='<div class="nav-grp">'
    +'<div class="nav-row'+(curFW==='tiers'?' sel':'')+'" onclick="selFW(\'tiers\')">'
    +'<span class="nr-num" style="font-size:9px">A/B</span>'
    +'<span>'+(lang==='en'?'Engagement Tiers':'Hizmet Kademeleri')+'</span></div>'
    +'</div>';
  document.getElementById('nav').innerHTML=h;
}

/* ── BUILD MID ── */
function buildMid(){
  var el=document.getElementById('mid');
  if(curDomFilter){ buildMidDomFilter(el); return; }
  if(!curFW||curFW==='tiers'){
    el.innerHTML='<div class="mid-empty"><div class="mid-empty-txt">'+(lang==='en'?'Select a framework\nor filter by domain':'Framework seçin\nveya domain filtreleyin')+'</div></div>';
    return;
  }
  var fw=FW[curFW];
  var h='<div class="mid-hd" style="border-top:3px solid '+fw.col+'">'
    +'<div class="mid-label">FRAMEWORK '+fw.num+'</div>'
    +'<div class="mid-name" style="color:'+fw.col+'">'+L(fw.name)+'</div>'
    +'<div class="mid-sub" style="color:'+fw.col+'">'+L(fw.sub)+'</div>'
    +'<div class="mid-desc">'+L(fw.desc)+'</div></div>';

  // flow steps
  h+='<div class="mid-sec"><div class="mid-sec-lbl">'+(lang==='en'?'SERVICE FLOW':'SERVİS AKIŞI')+'</div>';
  fw.steps.forEach(function(s,i){
    var a=(!curDomFilter&&curSvc===s.code)?' sel':'';
    h+='<div class="step-row'+a+'" onclick="selSvc(\''+s.code+'\')">'
      +'<span class="sr-num">'+s.n+'</span>'
      +'<span class="sr-name">'+L(s.name)+'</span>'
      +'<span class="sr-code">›</span></div>';
    if(fw.flow==='h'&&i<fw.steps.length-1) h+='<div class="step-arrow">↓</div>';
  });
  if(fw.flow==='cyc') h+='<div class="cyc-badge">↺ '+(lang==='en'?'Perpetual cycle':'Sürekli döngü')+'</div>';
  h+='</div>';

  // accordion domains
  h+='<div class="acc-sep"><div class="acc-sep-line"></div>'
    +'<div class="acc-sep-lbl">'+(lang==='en'?'DOMAINS':'DOMAİNLER')+'</div>'
    +'<div class="acc-sep-line"></div></div>';

  fw.doms.forEach(function(dk){
    var d=DOM[dk];
    var isOpen=!!openDoms[curFW+'_'+dk];
    var svcs=fw.steps.filter(function(s){ return s.dom===dk; });
    h+='<div class="acc-dom">'
      +'<div class="acc-hd'+(isOpen?' open':'')+'" onclick="toggleAcc(\''+dk+'\')">'
      +'<span class="acc-arr">›</span>'
      +'<span class="acc-dk">'+dk+'</span>'
      +'<span class="acc-dn">'+(d?L(d.name):dk)+'</span>'
      +'</div>'
      +'<div class="acc-body'+(isOpen?' open':'')+'">';
    svcs.forEach(function(s){
      var a=curSvc===s.code?' sel':'';
      var dots=[1,2,3].map(function(n){
        return '<span class="si-t '+(s.tiers.indexOf(n)>=0?'on':'off')+'">'+n+'</span>';
      }).join('');
      h+='<div class="svc-item'+a+'" onclick="selSvc(\''+s.code+'\')">'
        +'<span class="si-code">'+s.code+'</span>'
        +'<div><div class="si-name">'+L(s.name)+'</div>'
        +'<div class="si-tiers">'+dots+'</div></div></div>';
    });
    h+='</div></div>';
  });

  el.innerHTML=h;
}

function buildMidDomFilter(el){
  var dk=curDomFilter;
  var d=DOM[dk];
  // collect all services in this domain across all FWs
  var all=[];
  ['fw1','fw2','fw3','fw4','fw5','fw6'].forEach(function(k){
    FW[k].steps.forEach(function(s){ if(s.dom===dk) all.push({s:s,fw:FW[k]}); });
  });
  var h='<div class="dfb">'+(lang==='en'?'Domain:':'Domain:')+' <b>'+dk+'</b>'
    +'<span class="dfb-x" onclick="clearDomFilter()">✕</span></div>';
  h+='<div style="padding:12px 14px 10px;border-bottom:1px solid var(--b1);">'
    +'<div style="font-family:var(--mono);font-size:9px;color:var(--green);margin-bottom:3px;">'+dk+'</div>'
    +'<div style="font-size:12px;font-weight:600;color:var(--t1);margin-bottom:4px;">'+(d?L(d.name):dk)+'</div>'
    +'<div style="font-size:10px;color:var(--t2);line-height:1.6;font-weight:300;">'+(d?L(d.desc):'')+'</div></div>';
  h+='<div>';
  all.forEach(function(e){
    var s=e.s;
    var a=curSvc===s.code?' sel':'';
    var dots=[1,2,3].map(function(n){
      return '<span class="si-t '+(s.tiers.indexOf(n)>=0?'on':'off')+'">'+n+'</span>';
    }).join('');
    h+='<div class="svc-item'+a+'" onclick="selSvcDF(\''+s.code+'\')">'
      +'<span class="si-code">'+s.code+'</span>'
      +'<div>'
      +'<div style="font-family:var(--mono);font-size:7px;color:var(--t3);margin-bottom:1px;">FW-'+e.fw.num+'</div>'
      +'<div class="si-name">'+L(s.name)+'</div>'
      +'<div class="si-tiers">'+dots+'</div>'
      +'</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

/* ── BUILD DET ── */
function buildDet(){
  var el=document.getElementById('det');
  if(curFW==='tiers'){ el.innerHTML=tiersPage(); return; }
  if(!curSvc){
    el.innerHTML='<div class="det-empty"><div class="det-empty-icon">←</div>'
      +'<div class="det-empty-txt">'+(lang==='en'?'Select a flow step or\nopen a domain accordion':'Bir akış adımı seçin\nveya domain accordion\'ı açın')+'</div></div>';
    return;
  }
  var found=null;
  Object.keys(FW).forEach(function(k){ FW[k].steps.forEach(function(s){ if(s.code===curSvc) found=s; }); });
  if(!found){ el.innerHTML=''; return; }
  var s=found;
  var sc=L(s.scope).map(function(i){ return '<div class="det-li">'+i+'</div>'; }).join('');
  var dl=L(s.del).map(function(i){ return '<div class="det-li">'+i+'</div>'; }).join('');
  var tools=s.tools.map(function(t){ return '<span class="det-tool">'+t+'</span>'; }).join('');
  var tiers=TIERS.map(function(t,i){
    var on=s.tiers.indexOf(i+1)>=0;
    return '<div class="det-tier" style="'+(on?'border-color:rgba(23,122,70,.3);background:var(--green-bg)':'')+'">'
      +'<div class="dtt-l" style="color:'+(on?'var(--green)':'var(--b2)')+'">'+t.l+'</div>'
      +'<div class="dtt-n">'+L(t.name)+'</div>'
      +'<div class="dtt-t">'+L(t.tag)+'</div></div>';
  }).join('');
  el.innerHTML='<div class="det-inner">'
    +'<div class="det-eyebrow">'+s.code+' · '+s.dom+'</div>'
    +'<div class="det-title">'+L(s.name)+'</div>'
    +'<div class="det-desc">'+L(s.desc)+'</div>'
    +'<div class="det-card"><div class="dc-hd">'+(lang==='en'?'SCOPE':'KAPSAM')+'</div><div class="dc-bd">'+sc+'</div></div>'
    +'<div class="det-card"><div class="dc-hd">'+(lang==='en'?'TOOLS & TECHNOLOGIES':'ARAÇLAR')+'</div><div class="dc-bd"><div class="det-tools">'+tools+'</div></div></div>'
    +'<div class="det-card"><div class="dc-hd">'+(lang==='en'?'DELIVERABLES':'TESLİMATLAR')+'</div><div class="dc-bd">'+dl+'</div></div>'
    +'<div class="det-card"><div class="dc-hd">'+(lang==='en'?'ENGAGEMENT TIERS':'HİZMET KADEMELERİ')+'</div><div class="dc-bd"><div class="det-tier-row">'+tiers+'</div></div></div>'
    +'</div>';
}

/* ── ACTIONS ── */
function selFW(id){
  curFW=id; curDomFilter=null; curSvc=null;
  var fw=FW[id];
  document.getElementById('crumb').innerHTML=fw
    ?'FW-'+fw.num+' <b>'+L(fw.name)+'</b>'
    :'<b>'+(lang==='en'?'Engagement Tiers':'Hizmet Kademeleri')+'</b>';
  buildNav(); buildMid(); buildDet();
}
function selDomFilter(dk){
  curDomFilter=dk; curSvc=null;
  var d=DOM[dk];
  document.getElementById('crumb').innerHTML=d?'<b>'+L(d.name)+'</b>':'<b>'+dk+'</b>';
  buildNav(); buildMid(); buildDet();
}
function clearDomFilter(){
  curDomFilter=null;
  var fw=FW[curFW];
  if(fw) document.getElementById('crumb').innerHTML='FW-'+fw.num+' <b>'+L(fw.name)+'</b>';
  buildNav(); buildMid(); buildDet();
}
function toggleAcc(dk){
  var key=curFW+'_'+dk;
  openDoms[key]=!openDoms[key];
  buildMid();
}
function selSvc(code){
  curSvc=code;
  buildMid(); buildDet();
}
function selSvcDF(code){
  curSvc=code;
  buildMidDomFilter(document.getElementById('mid'));
  buildDet();
}
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('on'); });
  document.querySelectorAll('.lang-btn').forEach(function(b){ if(b.textContent.trim().toLowerCase()===l) b.classList.add('on'); });
  document.title=l==='en'?'Siaflex — Service Catalog':'Siaflex — Servis Kataloğu';
  if(curDomFilter&&DOM[curDomFilter]) document.getElementById('crumb').innerHTML='<b>'+L(DOM[curDomFilter].name)+'</b>';
  else if(curFW&&FW[curFW]) document.getElementById('crumb').innerHTML='FW-'+FW[curFW].num+' <b>'+L(FW[curFW].name)+'</b>';
  buildNav(); buildMid(); buildDet();
}

selFW('fw1');
</script>
